name: release

# Build the menu-bar app on each native OS and attach the installers to a
# GitHub Release. Triggered by pushing a version tag (e.g. v0.1.0).
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: ./app
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./app
          tagName: ${{ github.ref_name }}
          releaseName: "PulseGraph ${{ github.ref_name }}"
          releaseBody: |
            PulseGraph ${{ github.ref_name }} — your Claude Code token usage as a heatmap.

            Downloads below: macOS (`.dmg`/`.app`), Windows (`.msi`/`.exe`), Linux (`.deb`/`.AppImage`).

            > macOS builds are unsigned — on first launch, right-click the app and choose **Open**.
            > Windows and Linux builds are experimental (the menu-bar UX is verified on macOS).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
